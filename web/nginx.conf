# Serve the Vite SPA. try_files falls back to index.html so a deep-link / hard-refresh doesn't 404
# (the app is a single-page client; the API lives on the separate server service, not here).
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
