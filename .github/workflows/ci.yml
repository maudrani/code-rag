name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint + format (Biome)
        run: npx @biomejs/biome ci .
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Run-it smoke (built CLI works out-of-box, FTR-4 TKT-006)
        run: |
          npm run build
          node dist/src/cli/index.js --help | grep -q "usage:"

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Lint + typecheck + test + build (web UI)
        run: npm run ci

# Two gates: `check` (backend — Biome + tsc + vitest, ADR-009) and `web` (the standalone
# Vite UI — Biome + tsc + vitest + build). Master owns this file (.github/ = _master, RULE-011).
